<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo TS</title>
</head>
<body>

  <h1>Saludo</h1>
  <input type="text" id="nombre" placeholder="Escribe tu nombre">
  <button id="btnSaludar">Saludar</button>

  <p id="resultado"></p>

  <script type="module">
    const input = document.getElementById("nombre") as HTMLInputElement;
    const resultado = document.getElementById("resultado") as HTMLParagraphElement;
    const boton = document.getElementById("btnSaludar") as HTMLButtonElement;

    function saludar(nombre: string): string {
      return `Hola, ${nombre}!`;
    }

    boton.addEventListener("click", () => {
      const nombre = input.value;
      resultado.innerText = saludar(nombre);
    });
  </script>

</body>
</html>
