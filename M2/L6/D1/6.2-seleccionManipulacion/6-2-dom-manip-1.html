<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>6.2 - Manipulación de texto con jQuery</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <h1>Selección y manipulación de texto</h1>

  <p id="parrafo-original">
    Este texto será reemplazado usando jQuery.
  </p>

  <button id="btn-texto">Cambiar texto</button>
  <button id="btn-html">Agregar HTML</button>

  <script>
    $(function () {
      $("#btn-texto").on("click", function () {
        $("#parrafo-original").text("Nuevo texto simple usando .text()");
      });

      $("#btn-html").on("click", function () {
        $("#parrafo-original").html(
          'Texto con <strong>formato</strong> insertado usando .html()'
        );
      });
    });

    document.addEventListener("DOMContentLoaded", function () {
      // Botón para cambiar texto simple (.text() -> .textContent)
      document.getElementById("btn-texto").addEventListener("click", function () {
        document.getElementById("parrafo-original").textContent = "Nuevo texto simple usando .textContent";
      });

      // Botón para cambiar HTML (.html() -> .innerHTML)
      document.getElementById("btn-html").addEventListener("click", function () {
        document.getElementById("parrafo-original").innerHTML = 
          'Texto con <strong>formato</strong> insertado usando .innerHTML';
      });
    });
  </script>
</body>
</html>
